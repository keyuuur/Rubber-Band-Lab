<script>
(function () {
  'use strict';

  var CONFIG = {
    storageKey: 'cps_rubber_band_lab_first_pass',
    teacherEmail: 'patelk07@psdr3.org',
    resultChoices: ['Made', 'Missed'],
    resultMeta: {
      'Made': { label: 'MADE', icon: '&#10003;', key: 'made' },
      'Missed': { label: 'MISSED', icon: '&#10007;', key: 'missed' }
    },
    stretchChoices: ['Small', 'Medium', 'Large'],
    forceChoices: ['', 'Applied force', 'Magnetic force', 'Friction', 'Air resistance', 'Gravity', 'Normal force'],
    round1TrialsPerStretch: 10,
    round2TrialsPerDistance: 10,
    round1StretchKeys: ['small', 'medium', 'large'],
    round2DistanceKeys: ['3ft', '6ft', '9ft']
  };

  var STORAGE_KEY = CONFIG.storageKey;
  var teacherEmail = CONFIG.teacherEmail;
  var resultChoices = CONFIG.resultChoices;
  var resultMeta = CONFIG.resultMeta;
  var stretchChoices = CONFIG.stretchChoices;
  var forceChoices = CONFIG.forceChoices;
  var ROUND1_TRIALS_PER_STRETCH = CONFIG.round1TrialsPerStretch;
  var ROUND2_TRIALS_PER_DISTANCE = CONFIG.round2TrialsPerDistance;
  var ROUND1_STRETCH_KEYS = CONFIG.round1StretchKeys;
  var ROUND2_DISTANCE_KEYS = CONFIG.round2DistanceKeys;

  CONFIG.screens = [
    { key: 'start', label: 'Group Info', render: renderStart },
    { key: 'safety', label: 'Safety', render: renderSafety },
    { key: 'prediction', label: 'Prediction', render: renderPrediction },
    { key: 'round1', label: 'Round 1', render: renderRound1 },
    { key: 'analysis1', label: 'Analysis 1', render: renderAnalysis1 },
    { key: 'round2', label: 'Round 2', render: renderRound2 },
    { key: 'fbd', label: 'Free-Body Diagrams', render: renderFbd },
    { key: 'finalQs', label: 'Final Qs', render: renderFinalQs },
    { key: 'review', label: 'Review/Submit', render: renderReview }
  ];

  CONFIG.sidebarSteps = CONFIG.screens.map(function (screen) {
    return { label: screen.label === 'Free-Body Diagrams' ? 'FBD' : (screen.label === 'Review/Submit' ? 'Review & Submit' : screen.label), keys: [screen.key] };
  });

  var screens = CONFIG.screens;
  var sidebarSteps = CONFIG.sidebarSteps;

  var stateStore = {
    fresh: freshState,
    load: loadState,
    save: saveState
  };
  var fieldModel = {
    round1Fields: r1Fields,
    round2ShotFields: r2ShotFields,
    round2StretchFields: r2StretchFields,
    round2CompletionFields: r2CompletionFields
  };
  var validation = {
    screenBlocker: getScreenBlocker,
    screenWarning: getScreenWarning,
    submissionBlocker: getSubmissionBlocker,
    submissionWarning: getSubmissionWarning
  };
  var renderers = {
    screen: screenWrap,
    select: selectField,
    reviewItem: reviewItem,
    proofItem: proofItem
  };
  var shotKiosk = {
    render: renderTenShotKiosk,
    renderBlocks: renderBlockButtons,
    recordResult: recordKioskResult,
    setBlock: setKioskBlock,
    setTrial: setKioskTrial
  };
  var submission = {
    submit: submitLab,
    showSubmittedProof: showSubmittedProof,
    showBackupProof: showBackupProof
  };

  var state = stateStore.load();
  var host = document.getElementById('screenHost');
  var sideNav = document.getElementById('sideNav');
  var backBtn = document.getElementById('backBtn');
  var nextBtn = document.getElementById('nextBtn');
  var resetBtn = document.getElementById('resetBtn');
  var backupBtn = document.getElementById('backupBtn');

  if (state.hadSavedWork) {
    document.getElementById('resumeWarning').classList.remove('hidden');
  }

  render();

  backBtn.addEventListener('click', function () {
    if (state.mode === 'backup') {
      returnToLabFromBackup();
      return;
    }
    if (state.screenIndex > 0) {
      state.screenIndex -= 1;
      saveState();
      render();
    }
  });

  nextBtn.addEventListener('click', function () {
    if (state.mode === 'submitted') {
      return;
    }
    if (state.mode === 'backup') {
      returnToLabFromBackup();
      return;
    }
    if (screens[state.screenIndex].key === 'review') {
      submitLab();
      return;
    }
    var blocker = getScreenBlocker(screens[state.screenIndex].key);
    if (blocker) {
      window.alert(blocker);
      return;
    }
    var warning = getScreenWarning(screens[state.screenIndex].key);
    if (warning && !window.confirm(warning + '\n\nKeep going anyway?')) {
      return;
    }
    state.screenIndex = Math.min(state.screenIndex + 1, screens.length - 1);
    saveState();
    render();
  });

  resetBtn.addEventListener('click', function () {
    if (state.mode === 'backup') {
      window.alert('Do not reset yet. Show Backup Proof Only to Mr. Patel first.');
      return;
    }
    var message = state.mode === 'submitted'
      ? 'Clear the submitted proof from this iPad? Only do this after Mr. Patel has checked the submission ID.'
      : 'Are you sure you want to clear this group\'s work?';
    if (window.confirm(message)) {
      localStorage.removeItem(STORAGE_KEY);
      state = freshState(false);
      render();
      document.getElementById('resumeWarning').classList.add('hidden');
    }
  });

  backupBtn.addEventListener('click', function () {
    if (state.mode === 'submitted') return;
    showBackupProof();
  });

  function freshState(hadSavedWork) {
    return {
      screenIndex: 0,
      mode: 'work',
      ui: defaultUiState(),
      responses: {
        client_attempt_id: makeAttemptId()
      },
      submitted: null,
      submittedProof: null,
      hadSavedWork: hadSavedWork
    };
  }

  function loadState() {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return freshState(false);
    try {
      var parsed = JSON.parse(raw);
      parsed.hadSavedWork = true;
      parsed.responses = parsed.responses || {};
      normalizeResponseValues(parsed.responses);
      parsed.responses.client_attempt_id = parsed.responses.client_attempt_id || makeAttemptId();
      parsed.screenIndex = Math.min(Math.max(Number(parsed.screenIndex) || 0, 0), screens.length - 1);
      parsed.mode = parsed.mode || 'work';
      parsed.ui = normalizeUiState(parsed.ui);
      parsed.submittedProof = parsed.submittedProof || null;
      return parsed;
    } catch (err) {
      return freshState(false);
    }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      screenIndex: state.screenIndex,
      mode: state.mode,
      ui: state.ui,
      responses: state.responses,
      submitted: state.submitted,
      submittedProof: state.submittedProof
    }));
  }

  function render() {
    if (state.mode === 'submitted' && (state.submittedProof || state.submitted)) {
      showSubmittedProof(state.submittedProof || buildSubmittedProof(state.submitted));
      return;
    }
    if (state.mode === 'backup') {
      showBackupProof();
      return;
    }

    var screen = screens[state.screenIndex];
    document.body.classList.remove('proof-mode');
    renderSidebar(screen.key);
    document.getElementById('stepLabel').textContent = screen.label;
    document.getElementById('stepCount').textContent = (state.screenIndex + 1) + ' of ' + screens.length;
    document.getElementById('progressFill').style.width = Math.round(((state.screenIndex + 1) / screens.length) * 100) + '%';

    host.innerHTML = screen.render();
    backBtn.textContent = 'Back';
    backBtn.disabled = state.screenIndex === 0;
    nextBtn.disabled = false;
    nextBtn.textContent = screen.key === 'review' ? 'Submit Lab' : 'Next';
    resetBtn.disabled = false;
    backupBtn.classList.remove('hidden');

    bindInputs();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function defaultUiState() {
    return {
      round1Stretch: 'small',
      round1Trial: 1,
      round2Distance: '3ft',
      round2Trial: 1,
      memberNameDraft: ''
    };
  }

  function normalizeUiState(ui) {
    var defaults = defaultUiState();
    ui = ui || {};
    return {
      round1Stretch: ROUND1_STRETCH_KEYS.indexOf(ui.round1Stretch) > -1 ? ui.round1Stretch : defaults.round1Stretch,
      round1Trial: clampTrial(ui.round1Trial, ROUND1_TRIALS_PER_STRETCH),
      round2Distance: ROUND2_DISTANCE_KEYS.indexOf(ui.round2Distance) > -1 ? ui.round2Distance : defaults.round2Distance,
      round2Trial: clampTrial(ui.round2Trial, ROUND2_TRIALS_PER_DISTANCE),
      memberNameDraft: ui.memberNameDraft || ''
    };
  }

  function clampTrial(value, max) {
    var trial = Number(value) || 1;
    return Math.min(Math.max(trial, 1), max);
  }

  function renderSidebar(activeKey) {
    if (!sideNav) return;
    sideNav.innerHTML = sidebarSteps.map(function (step, index) {
      var active = step.keys.indexOf(activeKey) > -1;
      return '<div class="sidebar-step' + (active ? ' active' : '') + '">' +
        '<span class="sidebar-number">' + (index + 1) + '</span>' +
        '<span>' + escapeHtml(step.label) + '</span>' +
      '</div>';
    }).join('');
  }

  function bindInputs() {
    host.querySelectorAll('[data-field]').forEach(function (input) {
      var field = input.getAttribute('data-field');
      if (input.type === 'checkbox') {
        input.checked = !!state.responses[field];
      } else if (input.type === 'radio') {
        input.checked = state.responses[field] === input.value;
      } else {
        input.value = state.responses[field] || '';
      }
      input.addEventListener('input', handleInput);
      input.addEventListener('change', handleInput);
    });

    host.querySelectorAll('[data-choice-field]').forEach(function (button) {
      var field = button.getAttribute('data-choice-field');
      var value = button.getAttribute('data-choice-value');
      button.classList.toggle('selected', state.responses[field] === value);
      button.addEventListener('click', function () {
        state.responses[field] = value;
        saveState();
        render();
      });
    });

    host.querySelectorAll('[data-member-draft]').forEach(function (input) {
      input.value = state.ui.memberNameDraft || '';
      input.addEventListener('input', function () {
        state.ui.memberNameDraft = input.value;
        saveState();
      });
      input.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          addMemberNameFromDraft();
        }
      });
    });

    host.querySelectorAll('[data-add-member]').forEach(function (button) {
      button.addEventListener('click', addMemberNameFromDraft);
    });

    host.querySelectorAll('[data-remove-member]').forEach(function (button) {
      button.addEventListener('click', function () {
        removeMemberName(Number(button.getAttribute('data-remove-member')));
      });
    });

    host.querySelectorAll('[data-kiosk-result]').forEach(function (button) {
      button.addEventListener('click', function () {
        recordKioskResult(button.getAttribute('data-kiosk-round'), button.getAttribute('data-kiosk-result'));
      });
    });

    host.querySelectorAll('[data-kiosk-trial]').forEach(function (button) {
      button.addEventListener('click', function () {
        setKioskTrial(button.getAttribute('data-kiosk-round'), button.getAttribute('data-kiosk-trial'));
      });
    });

    host.querySelectorAll('[data-kiosk-block-select]').forEach(function (select) {
      select.addEventListener('change', function () {
        setKioskBlock(select.getAttribute('data-kiosk-round'), select.value);
      });
    });

    host.querySelectorAll('[data-kiosk-block-button]').forEach(function (button) {
      button.addEventListener('click', function () {
        setKioskBlock(button.getAttribute('data-kiosk-round'), button.getAttribute('data-kiosk-block-button'));
      });
    });

    host.querySelectorAll('[data-kiosk-next]').forEach(function (button) {
      button.addEventListener('click', function () {
        handleKioskNext(button.getAttribute('data-kiosk-round'));
      });
    });

    host.querySelectorAll('[data-local-back]').forEach(function (button) {
      button.addEventListener('click', function () {
        backBtn.click();
      });
    });

    host.querySelectorAll('[data-info-alert]').forEach(function (button) {
      button.addEventListener('click', function () {
        window.alert(button.getAttribute('data-info-alert'));
      });
    });

  }

  function handleInput(event) {
    var input = event.target;
    var field = input.getAttribute('data-field');
    if (!field) return;
    var value = input.type === 'checkbox' ? input.checked : input.value;
    state.responses[field] = isShotResultField(field) ? normalizeShotResult(value) : value;
    saveState();
    if (isRound2StretchField(field)) render();
  }

  function normalizeResponseValues(responses) {
    responses = responses || {};
    r1Fields().concat(r2ShotFields()).forEach(function (field) {
      if (responses[field]) responses[field] = normalizeShotResult(responses[field]);
    });
    delete responses.setup_video_required;
    delete responses.video_email_confirmed;
    delete responses.video_sender_email;
    delete responses.video_clip_description;
    ROUND2_DISTANCE_KEYS.forEach(function (distance) {
      delete responses['r2_' + distance + '_video'];
    });
    return responses;
  }

  function normalizeShotResult(value) {
    var cleaned = String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
    if (!cleaned) return '';
    if (cleaned === 'made') return 'Made';
    if (cleaned === 'missed' || cleaned === 'missed short' || cleaned === 'missed long' || cleaned === 'missed side') return 'Missed';
    return value;
  }

  function isShotResultField(field) {
    return r1Fields().concat(r2ShotFields()).indexOf(field) > -1;
  }

  function isRound2StretchField(field) {
    return r2StretchFields().indexOf(field) > -1;
  }

  function getMemberNameList() {
    if (!state.responses.member_names) return [];
    return String(state.responses.member_names)
      .split(/[\n,;]+/)
      .map(function (name) { return name.trim(); })
      .filter(function (name) { return name !== ''; });
  }

  function setMemberNameList(names) {
    state.responses.member_names = names.map(function (name) {
      return String(name || '').trim();
    }).filter(function (name) {
      return name !== '';
    }).join('\n');
  }

  function addMemberNameFromDraft() {
    var name = String(state.ui.memberNameDraft || '').trim().replace(/\s+/g, ' ');
    if (!name) return;
    var names = getMemberNameList();
    var alreadyListed = names.some(function (existing) {
      return existing.toLowerCase() === name.toLowerCase();
    });
    if (alreadyListed) {
      window.alert('That name is already on the list.');
      return;
    }
    names.push(name);
    setMemberNameList(names);
    state.ui.memberNameDraft = '';
    saveState();
    render();
  }

  function removeMemberName(index) {
    var names = getMemberNameList();
    if (index < 0 || index >= names.length) return;
    names.splice(index, 1);
    setMemberNameList(names);
    saveState();
    render();
  }

  function recordKioskResult(roundKey, value) {
    var field = getActiveKioskField(roundKey);
    if (!field) return;
    state.responses[field] = normalizeShotResult(value);
    advanceToNextBlank(roundKey);
    saveState();
    render();
  }

  function setKioskTrial(roundKey, trial) {
    if (roundKey === 'round1') {
      state.ui.round1Trial = clampTrial(trial, ROUND1_TRIALS_PER_STRETCH);
    } else if (roundKey === 'round2') {
      state.ui.round2Trial = clampTrial(trial, ROUND2_TRIALS_PER_DISTANCE);
    }
    saveState();
    render();
  }

  function setKioskBlock(roundKey, value) {
    if (roundKey === 'round1' && ROUND1_STRETCH_KEYS.indexOf(value) > -1) {
      if (isRound1BlockLocked(value)) return;
      state.ui.round1Stretch = value;
      state.ui.round1Trial = firstBlankTrial(round1BlockFields(value), ROUND1_TRIALS_PER_STRETCH);
    } else if (roundKey === 'round2' && ROUND2_DISTANCE_KEYS.indexOf(value) > -1) {
      state.ui.round2Distance = value;
      state.ui.round2Trial = firstBlankTrial(round2BlockFields(value), ROUND2_TRIALS_PER_DISTANCE);
    }
    saveState();
    render();
  }

  function handleKioskNext(roundKey) {
    if (isRound2AwaitingStretchChoice(roundKey)) {
      window.alert('Choose which stretch worked best for this distance before moving on.');
      return;
    }
    if (isActiveBlockComplete(roundKey)) {
      if (isRoundComplete(roundKey)) {
        goToNextScreen();
        return;
      }
      moveToNextIncompleteBlock(roundKey);
      saveState();
      render();
      return;
    }

    if (roundKey === 'round1') {
      state.ui.round1Trial = state.ui.round1Trial >= ROUND1_TRIALS_PER_STRETCH ? firstBlankTrial(round1BlockFields(state.ui.round1Stretch), ROUND1_TRIALS_PER_STRETCH) : state.ui.round1Trial + 1;
    } else if (roundKey === 'round2') {
      state.ui.round2Trial = state.ui.round2Trial >= ROUND2_TRIALS_PER_DISTANCE ? firstBlankTrial(round2BlockFields(state.ui.round2Distance), ROUND2_TRIALS_PER_DISTANCE) : state.ui.round2Trial + 1;
    }
    saveState();
    render();
  }

  function goToNextScreen() {
    state.screenIndex = Math.min(state.screenIndex + 1, screens.length - 1);
    saveState();
    render();
  }

  function advanceToNextBlank(roundKey) {
    var fields = getActiveBlockFields(roundKey);
    var current = roundKey === 'round1' ? state.ui.round1Trial : state.ui.round2Trial;
    for (var offset = 1; offset < fields.length; offset++) {
      var trial = ((current + offset - 1) % fields.length) + 1;
      if (!state.responses[fields[trial - 1]]) {
        setActiveTrialNoRender(roundKey, trial);
        return;
      }
    }

    if (isActiveBlockComplete(roundKey)) {
      moveToNextIncompleteBlock(roundKey);
      return;
    }

    setActiveTrialNoRender(roundKey, current);
  }

  function getActiveBlockFields(roundKey) {
    return roundKey === 'round1' ? round1BlockFields(state.ui.round1Stretch) : round2BlockFields(state.ui.round2Distance);
  }

  function isActiveBlockComplete(roundKey) {
    var fields = getActiveBlockFields(roundKey);
    var shotsComplete = countFields(fields) >= fields.length;
    if (roundKey === 'round1') return shotsComplete;
    return shotsComplete && !!state.responses['r2_' + state.ui.round2Distance + '_stretch'];
  }

  function isActiveBlockShotsComplete(roundKey) {
    var fields = getActiveBlockFields(roundKey);
    return countFields(fields) >= fields.length;
  }

  function isRound2AwaitingStretchChoice(roundKey) {
    return roundKey === 'round2' &&
      isActiveBlockShotsComplete(roundKey) &&
      !state.responses['r2_' + state.ui.round2Distance + '_stretch'];
  }

  function moveToNextIncompleteBlock(roundKey) {
    var blocks = roundKey === 'round1' ? ROUND1_STRETCH_KEYS : ROUND2_DISTANCE_KEYS;
    var currentBlock = roundKey === 'round1' ? state.ui.round1Stretch : state.ui.round2Distance;
    var startIndex = Math.max(blocks.indexOf(currentBlock), 0);
    if (roundKey === 'round1') {
      for (var nextIndex = startIndex + 1; nextIndex < blocks.length; nextIndex++) {
        if (!isBlockComplete(roundKey, blocks[nextIndex])) {
          setActiveBlockNoRender(roundKey, blocks[nextIndex]);
          setActiveTrialNoRender(roundKey, firstBlankTrial(getBlockFields(roundKey, blocks[nextIndex]), ROUND1_TRIALS_PER_STRETCH));
          return;
        }
      }
      return;
    }
    for (var offset = 1; offset <= blocks.length; offset++) {
      var block = blocks[(startIndex + offset) % blocks.length];
      if (!isBlockComplete(roundKey, block)) {
        setActiveBlockNoRender(roundKey, block);
        setActiveTrialNoRender(roundKey, firstBlankTrial(getBlockFields(roundKey, block), roundKey === 'round1' ? ROUND1_TRIALS_PER_STRETCH : ROUND2_TRIALS_PER_DISTANCE));
        return;
      }
    }
  }

  function isBlockComplete(roundKey, block) {
    var fields = getBlockFields(roundKey, block);
    var shotsComplete = countFields(fields) >= fields.length;
    if (roundKey === 'round1') return shotsComplete;
    return shotsComplete && !!state.responses['r2_' + block + '_stretch'];
  }

  function isRoundComplete(roundKey) {
    var blocks = roundKey === 'round1' ? ROUND1_STRETCH_KEYS : ROUND2_DISTANCE_KEYS;
    return blocks.every(function (block) {
      return isBlockComplete(roundKey, block);
    });
  }

  function isRound1BlockLocked(block) {
    var index = ROUND1_STRETCH_KEYS.indexOf(block);
    if (index <= 0) return false;
    for (var i = 0; i < index; i++) {
      if (!isBlockComplete('round1', ROUND1_STRETCH_KEYS[i])) return true;
    }
    return false;
  }

  function getKioskNextLabel(roundKey) {
    if (isRound2AwaitingStretchChoice(roundKey)) return 'Choose Stretch';
    if (isActiveBlockComplete(roundKey)) {
      if (isRoundComplete(roundKey)) return roundKey === 'round1' ? 'Next Round' : 'Next Step';
      return roundKey === 'round1' ? 'Next Stretch' : 'Next Distance';
    }
    return 'Next Shot';
  }

  function getBlockFields(roundKey, block) {
    return roundKey === 'round1' ? round1BlockFields(block) : round2BlockFields(block);
  }

  function setActiveBlockNoRender(roundKey, block) {
    if (roundKey === 'round1') {
      state.ui.round1Stretch = block;
    } else if (roundKey === 'round2') {
      state.ui.round2Distance = block;
    }
  }

  function firstBlankTrial(fields, max) {
    for (var i = 0; i < fields.length; i++) {
      if (!state.responses[fields[i]]) return i + 1;
    }
    return 1;
  }

  function setActiveTrialNoRender(roundKey, trial) {
    if (roundKey === 'round1') {
      state.ui.round1Trial = clampTrial(trial, ROUND1_TRIALS_PER_STRETCH);
    } else if (roundKey === 'round2') {
      state.ui.round2Trial = clampTrial(trial, ROUND2_TRIALS_PER_DISTANCE);
    }
  }

  function getActiveKioskField(roundKey) {
    if (roundKey === 'round1') {
      return 'r1_' + state.ui.round1Stretch + '_t' + state.ui.round1Trial;
    }
    if (roundKey === 'round2') {
      return 'r2_' + state.ui.round2Distance + '_t' + state.ui.round2Trial;
    }
    return '';
  }

  function renderStart() {
    return screenWrap('Start: Group Info',
      'Enter your group information. Your group will submit one lab write-up together.',
      '<div class="field-grid">' +
        selectField('Period', 'period', ['', '1st hour', '7th hour'], 'Choose period') +
        textField('Group name', 'group_name', 'Example: Energy Eagles') +
      '</div>' +
      renderMemberNameBuilder() +
      '<div class="mini-note">Work in groups of 3-4. One submission per group. Ask your teacher if your group has only 2.</div>');
  }

  function renderMemberNameBuilder() {
    var names = getMemberNameList();
    return '<section class="member-builder">' +
      '<h3>Group member names</h3>' +
      '<p>Add one group member at a time. First names are enough.</p>' +
      '<div class="member-add-row">' +
        '<input type="text" data-member-draft="true" placeholder="Type one name">' +
        '<button class="primary" type="button" data-add-member="true">Add Name</button>' +
      '</div>' +
      '<div class="member-count">' + names.length + ' added. 2 names minimum. Groups are usually 3-4.</div>' +
      '<div class="member-list">' + (names.length ? names.map(function (name, index) {
        return '<div class="member-pill"><span>' + escapeHtml(name) + '</span><button class="secondary small" type="button" data-remove-member="' + index + '">Remove</button></div>';
      }).join('') : '<div class="member-empty">No names added yet.</div>') + '</div>' +
    '</section>';
  }

  function renderSafety() {
    var checks = [
      ['safety_pompom_only', 'We are using a soft pom-pom only.'],
      ['safety_not_at_people', 'We will not aim at people.'],
      ['setup_basket_backboard', 'Our basket and backboard are set up.'],
      ['setup_launch_line', 'Our launch line is marked.'],
      ['setup_round1_6ft', 'During Round 1, the basket will stay at 6 ft.']
    ];
    return screenWrap('Safety and Setup Check',
      'Check each box before starting. These rules keep the lab safe and fair.',
      '<div class="check-list">' + checks.map(function (item) {
        return '<label class="check-row"><input type="checkbox" data-field="' + item[0] + '"><span>' + item[1] + '</span></label>';

  function submitLab() {
    var blocker = getSubmissionBlocker();
    if (blocker) {
      window.alert(blocker);
      return;
    }

    var warning = getSubmissionWarning();
    if (warning && !window.confirm(warning + '\n\nSubmit anyway? Missing answers can score 0.')) {
      return;
    }

    nextBtn.disabled = true;
    nextBtn.textContent = 'Submitting...';
    normalizeResponseValues(state.responses);
    var payload = Object.assign({}, state.responses, {
      user_agent: navigator.userAgent,
      emergency_mode_used: false
    });

    if (!window.google || !google.script || !google.script.run) {
      showSubmitFailure('This page is not connected to Apps Script right now.');
      return;
    }

    google.script.run
      .withSuccessHandler(function (response) {
        if (response && response.ok) {
          enterSubmittedMode(response);
        } else {
          showSubmitFailure(response && response.message ? response.message : 'The Sheet did not save this time.');
        }
      })
      .withFailureHandler(function (error) {
        showSubmitFailure(error && error.message ? error.message : 'The Sheet did not save this time.');
      })
      .submitLab(payload);
  }

  function showSubmitFailure(message) {
    nextBtn.disabled = false;
    nextBtn.textContent = 'Submit Lab';
    state.lastSubmitError = message;
    saveState();
    host.innerHTML = screenWrap('Submit Problem',
      '<span class="error-text">' + escapeHtml(message) + '</span>',
      '<p>Your answers are still saved on this iPad.</p>' +
      '<button class="primary" type="button" id="retrySubmit">Retry Submit</button> ' +
      '<button class="secondary" type="button" id="openBackup">Backup Proof Only</button>');
    document.getElementById('retrySubmit').addEventListener('click', submitLab);
    document.getElementById('openBackup').addEventListener('click', showBackupProof);
  }

  function enterSubmittedMode(response) {
    var proof = buildSubmittedProof(response);
    state.mode = 'submitted';
    state.submitted = null;
    state.submittedProof = proof;
    state.responses = {};
    state.ui = defaultUiState();
    saveState();
    showSubmittedProof(proof);
  }

  function buildSubmittedProof(response) {
    response = response || {};
    var serverScore = response.score && response.score.total !== undefined && response.score.total !== null
      ? response.score.total
      : estimateScore(state.responses).total;
    return {
      submissionId: response.submissionId || state.responses.server_submission_id || 'Saved',
      timestamp: response.timestamp || new Date().toISOString(),
      period: state.responses.period || response.period || '',
      groupName: state.responses.group_name || response.groupName || '',
      scoreTotal: serverScore,
      needsReview: !!response.needsReview,
      reviewReasons: response.reviewReasons || ''
    };
  }

  function showSubmittedProof(proof) {
    proof = proof || state.submittedProof || buildSubmittedProof(state.submitted);
    state.mode = 'submitted';
    state.submittedProof = proof;
    state.submitted = null;
    state.responses = {};
    saveState();
    document.body.classList.add('proof-mode');
    var template = document.getElementById('submittedTemplate').innerHTML;
    host.innerHTML = template;
    document.getElementById('submittedDetails').innerHTML =
      proofItem('Status', 'WAS submitted to Mr. Patel\'s Sheet') +
      proofItem('Submission ID', proof.submissionId || 'Saved') +
      proofItem('Time', formatDate(proof.timestamp || new Date())) +
      proofItem('Period', proof.period || '') +
      proofItem('Group', proof.groupName || '') +
      proofItem('Score', proof.scoreTotal + ' / 20');
    nextBtn.disabled = true;
    backBtn.disabled = true;
    resetBtn.disabled = false;
    backupBtn.classList.add('hidden');
    nextBtn.textContent = 'Submitted';
  }

  function showBackupProof() {
    if (state.mode === 'submitted') {
      showSubmittedProof(state.submittedProof || buildSubmittedProof(state.submitted));
      return;
    }
    state.mode = 'backup';
    saveState();
    document.body.classList.add('proof-mode');
    var score = estimateScore(state.responses);
    var template = document.getElementById('backupTemplate').innerHTML;
    host.innerHTML = template;
    document.getElementById('backupDetails').innerHTML =

    document.getElementById('backupJson').textContent = JSON.stringify({

    nextBtn.disabled = false;

    if (missing.length) return 'Missing: ' + missing.join(', ') + '.';

  function estimateScore(r) {
    var score = { total: 0 };
    var safetyOk = ['safety_pompom_only', 'safety_not_at_people', 'setup_basket_backboard', 'setup_launch_line', 'setup_round1_6ft'].every(function (field) { return !!r[field]; });
    score.total += safetyOk ? 2 : 0;
    var r1Count = countFields(r1Fields());
    score.total += r1Count >= r1Fields().length ? 3 : (r1Count >= ROUND1_TRIALS_PER_STRETCH * 2 ? 2 : (r1Count >= ROUND1_TRIALS_PER_STRETCH ? 1 : 0));
    score.total += r.r1_pattern_choice === 'More stretch usually made the pom-pom go farther.' ? 1 : 0;
    score.total += r.r1_most_elastic_potential_choice === 'Large stretch' ? 1 : 0;
    score.total += r.energy_blank_1 === 'elastic' && r.energy_blank_2 === 'kinetic' ? 1 : 0;
    score.total += countFields(r2CompletionFields()) >= r2CompletionFields().length ? 2 : (countFields(r2CompletionFields()) >= (ROUND2_TRIALS_PER_DISTANCE + 1) * 2 ? 1 : 0);
    score.total += 1;
    score.total += r.fbd_before_up === 'Normal force' ? 1 : 0;
    score.total += r.fbd_before_down === 'Gravity' ? 1 : 0;
    score.total += r.fbd_air_down === 'Gravity' ? 1 : 0;
    score.total += r.fbd_air_back === 'Air resistance' ? 1 : 0;
    score.total += r.conservation_q1 === 'False' ? 1 : 0;
    score.total += r.conservation_q2 === 'True' ? 1 : 0;
    score.total += r.conservation_q3 === 'True' ? 1 : 0;
    score.total += (r.final_main_idea || '').charAt(0) === 'A' ? 1 : 0;
    score.total += r.final_farther_baskets_stretch === 'more' ? 1 : 0;
    return score;
  }

        var text = index === 0 && option === '' ? placeholder : option;
        return '<option value="' + escapeHtml(value) + '">' + escapeHtml(text) + '</option>';
      }).join('') + '</select></label>';
  }

  function textField(label, field, placeholder) {
    return '<label class="field">' + label + '<input type="text" data-field="' + field + '" placeholder="' + escapeHtml(placeholder) + '"></label>';
  }

  function textAreaField(label, field, placeholder) {
    return '<label class="field">' + label + '<textarea data-field="' + field + '" placeholder="' + escapeHtml(placeholder) + '"></textarea></label>';
  }

  function choiceList(field, choices) {
    return '<div class="choice-list">' + choices.map(function (choice) {
      return '<label class="choice-row"><input type="radio" name="' + field + '" data-field="' + field + '" value="' + escapeHtml(choice) + '"><span>' + escapeHtml(choice) + '</span></label>';
    }).join('') + '</div>';
  }

  function trialRow(label, field) {
    return '<div class="trial-row"><div class="trial-label">' + escapeHtml(label) + '</div>' + tapChoices(field, resultChoices) + '</div>';
  }

  function tapChoices(field, choices) {
    return '<div class="result-buttons">' + choices.map(function (choice) {
      return '<button type="button" class="tap-choice" data-choice-field="' + field + '" data-choice-value="' + escapeHtml(choice) + '">' + escapeHtml(choice) + '</button>';
    }).join('') + '</div>';
  }

  function reviewItem(label, value) {
    return '<div class="review-item"><strong>' + escapeHtml(label) + '</strong><span>' + escapeHtml(value) + '</span></div>';
  }

  function proofItem(label, value) {
    return '<div><strong>' + escapeHtml(label) + '</strong><span>' + escapeHtml(value) + '</span></div>';
  }

  function round1BlockFields(stretch) {
    var fields = [];
    for (var i = 1; i <= ROUND1_TRIALS_PER_STRETCH; i++) {
      fields.push('r1_' + stretch + '_t' + i);
    }
    return fields;
  }

  function round2BlockFields(distance) {
    var fields = [];
    for (var i = 1; i <= ROUND2_TRIALS_PER_DISTANCE; i++) {
      fields.push('r2_' + distance + '_t' + i);
    }
    return fields;
  }

  function r1Fields() {
    var fields = [];
    ROUND1_STRETCH_KEYS.forEach(function (stretch) {
      fields = fields.concat(round1BlockFields(stretch));
    });
    return fields;
  }

  function r2CompletionFields() {
    return r2StretchFields().concat(r2ShotFields());
  }

  function r2StretchFields() {
    return ROUND2_DISTANCE_KEYS.map(function (distance) {
      return 'r2_' + distance + '_stretch';
    });
  }

  function r2ShotFields() {
    var fields = [];
    ROUND2_DISTANCE_KEYS.forEach(function (distance) {
      fields = fields.concat(round2BlockFields(distance));
    });
    return fields;
  }

  function countFields(fields) {
    return fields.reduce(function (total, field) {
      return total + (state.responses[field] ? 1 : 0);
    }, 0);
  }

  function countMemberNames(memberNames) {
    if (!memberNames) return 0;
    return String(memberNames).split(/[\n,;]+/).map(function (name) {
      return name.trim();
    }).filter(function (name) {
      return name !== '';
    }).length;
  }

  function summarizeFields(fields) {
    return fields.map(function (field) {
      return field + ': ' + (state.responses[field] || 'blank');
    }).join(' | ');
  }

  function summarizeScience() {
    return [
      'Pattern: ' + (state.responses.r1_pattern_choice || 'blank'),
      'Energy: ' + (state.responses.energy_blank_1 || 'blank') + ', ' + (state.responses.energy_blank_2 || 'blank'),
      'Forces: ' + [state.responses.fbd_before_up, state.responses.fbd_before_down, state.responses.fbd_air_down, state.responses.fbd_air_back].filter(Boolean).join(', '),
      'Final: ' + (state.responses.final_main_idea || 'blank')
    ].join(' | ');
  }

  function makeAttemptId() {
    return 'attempt-' + Date.now() + '-' + Math.floor(Math.random() * 100000);
  }

  function formatDate(value) {
    try {
      return new Date(value).toLocaleString();
    } catch (err) {
      return String(value);
    }
  }

  function cap(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
  }

  function distanceLabel(distance) {
    return distance.replace('ft', ' ft');
  }

  function stretchDisplayLabel(stretch) {
    return {
      small: 'Short stretch',
      medium: 'Medium stretch',
      large: 'Long stretch'
    }[stretch] || cap(stretch) + ' stretch';
  }

  function isEmailLike(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || '').trim());
  }

  function firstAvailableRound1Stretch() {
    for (var i = 0; i < ROUND1_STRETCH_KEYS.length; i++) {
      var stretch = ROUND1_STRETCH_KEYS[i];
      if (!isRound1BlockLocked(stretch) && !isBlockComplete('round1', stretch)) return stretch;
    }
    return ROUND1_STRETCH_KEYS[0];
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
})();
</script>
