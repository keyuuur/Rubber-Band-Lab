<style>
  :root {
    --ink: #18130b;
    --muted: #695f4e;
    --paper: #080c09;
    --panel: #fbf0d8;
    --panel-strong: #fff8e8;
    --line: #b88925;
    --line-soft: #d8bd7a;
    --primary: #075426;
    --primary-dark: #032d18;
    --accent: #d5a128;
    --gold: #e1b84b;
    --navy: #07120d;
    --navy-dark: #020403;
    --blue-soft: #f7ecd2;
    --green: #147833;
    --green-soft: #e7f4df;
    --orange: #c87d1c;
    --orange-soft: #fff0cb;
    --red: #a51f18;
    --red-soft: #ffe5df;
    --gray: #d4c8ab;
    --warn: #7a4b00;
    --danger: #9b1f18;
    --success-bg: #dff1d9;
    --backup-bg: #160e08;
    --control-dark: #050807;
    --control-panel: #0d1711;
    --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 0%, rgba(225, 184, 75, 0.14), transparent 28rem),
      linear-gradient(135deg, #040605 0%, #0a130d 55%, #020403 100%);
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px;
    line-height: 1.4;
  }

  button, input, select, textarea {
    font: inherit;
  }

  .kiosk-layout {
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    min-height: 100vh;
    border-top: 4px solid var(--gold);
  }

  .app-sidebar {
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    height: 100vh;
    padding: 22px 14px;
    border-right: 3px solid var(--gold);
    background:
      linear-gradient(180deg, rgba(12, 34, 20, 0.98), rgba(1, 3, 2, 0.98)),
      var(--navy-dark);
    color: var(--panel-strong);
    box-shadow: inset -10px 0 18px rgba(0, 0, 0, 0.32);
  }

  .sidebar-logo {
    display: grid;
    justify-items: center;
    gap: 10px;
    text-align: center;
  }

  .sidebar-mark {
    display: grid;
    place-items: center;
    width: 72px;
    height: 72px;
    border: 3px solid var(--gold);
    border-radius: 18px;
    background: radial-gradient(circle at 35% 28%, #153b24, #020403 70%);
    color: var(--gold);
    font-weight: 900;
    letter-spacing: 1px;
    box-shadow: 0 0 0 2px rgba(225, 184, 75, 0.2), 0 14px 24px rgba(0, 0, 0, 0.35);
  }

  .sidebar-logo h1 {
    color: var(--panel-strong);
    font-size: 1.45rem;
    line-height: 1.05;
    text-shadow: 0 2px 0 rgba(0, 0, 0, 0.55);
  }

  .sidebar-nav {
    display: grid;
    gap: 8px;
  }

  .sidebar-step {
    display: grid;
    grid-template-columns: 36px 1fr;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    padding: 6px 8px;
    border: 1px solid transparent;
    border-radius: 6px;
    color: #efe3c2;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0;
  }

  .sidebar-step.active {
    border-color: var(--gold);
    background: linear-gradient(180deg, #0b6d32, #043c1e);
    color: #fff7d9;
    box-shadow: 0 0 0 2px rgba(225, 184, 75, 0.16), 0 10px 18px rgba(0, 0, 0, 0.28);
  }

  .sidebar-number {
    display: grid;
    place-items: center;
    width: 32px;
    height: 32px;
    border: 2px solid var(--gold);
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.2);
  }

  .sidebar-reminder {
    display: grid;
    gap: 8px;
    margin-top: auto;
    padding: 16px;
    border: 2px solid rgba(225, 184, 75, 0.68);
    border-radius: 8px;
    background: linear-gradient(180deg, #fff7e1, #ead9ad);
    color: var(--ink);
    font-size: 0.9rem;
    box-shadow: var(--shadow);
  }

  .sidebar-reminder strong {
    color: var(--primary-dark);
    text-transform: uppercase;
  }

  .app-shell {
    min-width: 0;
    min-height: 100vh;
    padding: 24px 28px;
    background:
      linear-gradient(180deg, rgba(12, 23, 17, 0.94), rgba(4, 7, 5, 0.98)),
      var(--paper);
  }

  .proof-mode .kiosk-layout {
    grid-template-columns: 1fr;
  }

  .proof-mode .app-sidebar {
    display: none;
  }

  .top-bar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    color: var(--panel-strong);
  }

  .top-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  h1, h2, h3 {
    margin: 0;
    line-height: 1.15;
  }

  h1 {
    font-size: 2rem;
    color: inherit;
  }

  h2 {
    font-size: 1.75rem;
    margin-bottom: 8px;
  }

  h3 {
    font-size: 1.2rem;
    margin-bottom: 10px;
  }

  .notice {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    margin-bottom: 14px;
    border: 2px solid var(--gold);
    background: var(--panel-strong);
    border-radius: 8px;
  }

  .hidden {
    display: none !important;
  }

  .progress-wrap {
    margin-bottom: 18px;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 8px;
    color: #f5e8c3;
    font-weight: 700;
  }

  .progress-track {
    height: 12px;
    border: 1px solid rgba(225, 184, 75, 0.5);
    background: #030504;
    border-radius: 999px;
    overflow: hidden;
  }

  #progressFill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    transition: width 0.2s ease;
  }

  #screenHost {
    min-height: 58vh;
  }

  .screen {
    background: var(--panel);
    border: 3px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 22px;
    position: relative;
    overflow: hidden;
  }

  .screen-intro {
    max-width: 820px;
    margin: 0 0 18px;
    color: var(--muted);
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }

  label.field {
    display: grid;
    gap: 8px;
    font-weight: 700;
  }

  input[type="text"], input[type="email"], select, textarea {
    width: 100%;
    min-height: 54px;
    padding: 12px;
    border: 2px solid #9f7a2a;
    border-radius: 6px;
    background: #fffaf0;
    color: var(--ink);
    box-shadow: inset 0 2px 4px rgba(24, 19, 11, 0.08);
  }

  textarea {
    min-height: 96px;
    resize: vertical;
  }

  .check-list, .choice-list {
    display: grid;
    gap: 12px;
  }

  .check-row, .choice-row {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 58px;
    padding: 12px;
    border: 2px solid var(--line-soft);
    border-radius: 8px;
    background: var(--panel-strong);
    box-shadow: 0 6px 14px rgba(50, 34, 10, 0.06);
  }

  .check-row input, .choice-row input {
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }

  .card,
  .station-card {
    border: 2px solid var(--line-soft);
    border-radius: 8px;
    padding: 14px;
    background: var(--panel-strong);
    box-shadow: 0 8px 16px rgba(50, 34, 10, 0.08);
  }

  .station-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }

  .station-card {
    display: grid;
    align-content: start;
    gap: 12px;
  }

  .result-buttons {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .tap-choice {
    min-height: 52px;
    border: 2px solid var(--line-soft);
    border-radius: 6px;
    background: #fffaf0;
    color: var(--ink);
    font-weight: 700;
  }

  .tap-choice.selected {
    border-color: var(--gold);
    background: linear-gradient(180deg, #0b6a31, #043a1d);
    color: #fff8de;
  }

  .ten-shot-cards {
    grid-template-columns: 1fr;
  }

  .trial-card {
    display: grid;
    gap: 8px;
  }

  .trial-count {
    display: inline-block;
    margin-left: 8px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--orange-soft);
    color: var(--warn);
    font-size: 0.85rem;
    font-weight: 800;
  }

  .trial-row {
    display: grid;
    grid-template-columns: 86px 1fr;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    background: #fff8e8;
  }

  .trial-label {
    color: var(--muted);
    font-weight: 800;
  }

  .trial-row .result-buttons {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    margin-bottom: 0;
  }

  .trial-row .tap-choice {
    min-height: 44px;
    padding: 8px 6px;
    font-size: 0.92rem;
  }

  .meaning-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .mini-note {
    padding: 10px;
    border-left: 5px solid var(--gold);
    background: #fff5d6;
    border-radius: 6px;
    margin: 12px 0;
    font-weight: 800;
  }

  .member-builder {
    display: grid;
    gap: 14px;
    margin-top: 16px;
    padding: 18px;
    border: 3px solid var(--line);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(255, 250, 240, 0.92), rgba(247, 236, 210, 0.92)),
      var(--panel);
    box-shadow: 0 14px 28px rgba(50, 34, 10, 0.1);
  }

  .member-builder-header {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 16px;
  }

  .member-builder-header h3 {
    margin-bottom: 4px;
    color: var(--primary-dark);
    font-size: 1.35rem;
    text-transform: uppercase;
  }

  .member-builder p {
    margin: 0;
    color: var(--muted);
    font-weight: 700;
  }

  .member-add-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(170px, auto);
    gap: 12px;
  }

  .member-add-row input {
    min-height: 66px;
    font-size: 1.15rem;
  }

  .member-count-badge {
    display: inline-grid;
    place-items: center;
    min-width: 120px;
    min-height: 50px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 2px solid var(--orange);
    background: var(--orange-soft);
    color: var(--warn);
    font-weight: 800;
  }

  .member-count-badge.ok {
    border-color: var(--green);
    background: var(--green-soft);
    color: var(--green);
  }

  .member-expectation {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--line-soft);
    background: #fff5d6;
    color: var(--primary-dark);
    font-weight: 900;
  }

  .member-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .member-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-height: 58px;
    padding: 8px;
    border: 2px solid var(--line-soft);
    border-radius: 999px;
    background: #fffaf0;
    color: var(--ink);
    font-weight: 900;
  }

  .member-avatar {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border-radius: 999px;
    background: linear-gradient(180deg, var(--green), var(--primary-dark));
    color: #fff8de;
    font-size: 0.95rem;
  }

  .member-name {
    padding-right: 4px;
    font-size: 1.05rem;
  }

  .member-empty {
    color: var(--muted);
    font-weight: 800;
  }

  .kiosk-screen {
    display: grid;
    gap: 18px;
    min-height: 68vh;
    margin: -6px;
    padding: 18px;
    border: 3px solid var(--gold);
    border-radius: 12px;
    background:
      linear-gradient(180deg, rgba(12, 23, 17, 0.98), rgba(3, 6, 4, 0.98)),
      var(--control-panel);
    color: var(--panel-strong);
    box-shadow: inset 0 0 0 2px rgba(255, 245, 214, 0.07), 0 18px 36px rgba(0, 0, 0, 0.24);
  }

  .kiosk-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(260px, auto);
    align-items: start;
    gap: 18px;
  }

  .kiosk-title {
    margin: 0;
    color: #fff8de;
    font-size: 2.25rem;
    letter-spacing: 0;
    text-transform: uppercase;
    text-shadow: 0 3px 0 rgba(0, 0, 0, 0.65);
  }

  .kiosk-subtitle {
    margin: 6px 0 0;
    color: var(--gold);
    font-size: 1.25rem;
    font-weight: 900;
  }

  .kiosk-step-badge {
    align-self: start;
    padding: 12px 28px;
    border: 2px solid var(--gold);
    border-radius: 0 0 10px 10px;
    background: linear-gradient(180deg, #f2c758, #b67412);
    color: #171008;
    font-size: 1.1rem;
    font-weight: 900;
    box-shadow: 0 10px 22px rgba(0, 0, 0, 0.32);
  }

  .kiosk-trial-status {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    color: #fff4cd;
    font-weight: 900;
  }

  .kiosk-focus-card {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(220px, 0.7fr);
    gap: 12px;
    padding: 16px;
    border: 2px solid rgba(225, 184, 75, 0.72);
    border-radius: 8px;
    background: linear-gradient(180deg, #11381f, #06130c);
    color: #fff8de;
    box-shadow: 0 14px 26px rgba(0, 0, 0, 0.24);
  }

  .kiosk-focus-card div {
    display: grid;
    gap: 2px;
  }

  .kiosk-focus-card span {
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 900;
    text-transform: uppercase;
  }

  .kiosk-focus-card strong {
    font-size: 1.95rem;
    line-height: 1.05;
  }

  .info-button {
    min-height: 44px;
    padding: 8px 16px;
    border: 2px solid var(--gold);
    background: #fff7df;
    color: var(--primary-dark);
    border-radius: 8px;
    font-weight: 900;
  }

  .kiosk-context {
    margin-top: -4px;
    color: #f2e0ad;
    font-weight: 800;
    text-align: center;
  }

  .kiosk-block-buttons {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .kiosk-block-button {
    display: grid;
    gap: 6px;
    min-height: 86px;
    padding: 14px;
    border: 2px solid #7d6a3c;
    border-radius: 8px;
    background: linear-gradient(180deg, #211d14, #0a0b08);
    color: #fff4ce;
    text-align: left;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
  }

  .kiosk-block-button strong {
    font-size: 1.05rem;
  }

  .kiosk-block-button span {
    color: #dcc991;
    font-weight: 900;
  }

  .kiosk-block-button.active {
    border-color: var(--gold);
    background: linear-gradient(180deg, #0e7737, #043c1e);
    color: #fff8de;
    box-shadow: 0 0 0 3px rgba(225, 184, 75, 0.28), 0 10px 20px rgba(0, 0, 0, 0.26);
  }

  .kiosk-block-button.complete {
    border-color: #72b65d;
    background: linear-gradient(180deg, #174d24, #082113);
    color: #ecffe4;
  }

  .kiosk-block-button.needs-stretch {
    border-color: var(--orange);
    background: linear-gradient(180deg, #6a430f, #201306);
    color: #fff0c8;
  }

  .kiosk-block-button.locked {
    border-color: #6d6759;
    background: linear-gradient(180deg, #28251e, #10100c);
    color: #b9ad8b;
    box-shadow: none;
  }

  .kiosk-block-button.locked span {
    color: #d0c39a;
  }

  .kiosk-stretch-row {
    max-width: 420px;
    justify-self: center;
    width: 100%;
  }

  .kiosk-stretch-row.after-shots {
    display: grid;
    gap: 10px;
    max-width: 640px;
    padding: 18px;
    border: 3px solid var(--gold);
    border-radius: 10px;
    background: var(--panel-strong);
    box-shadow: 0 12px 26px rgba(7, 24, 63, 0.1);
  }

  .kiosk-stretch-row.after-shots.needs-answer {
    border-color: var(--orange);
    background: var(--orange-soft);
  }

  .kiosk-stretch-row.after-shots.pending {
    color: var(--muted);
    font-weight: 800;
    text-align: center;
    border-color: var(--line-soft);
    background: #fff7e5;
  }

  .kiosk-stretch-row.after-shots.pending strong,
  .stretch-question-title {
    color: var(--primary-dark);
    font-size: 1.1rem;
    font-weight: 900;
  }

  .stretch-choice-question {
    color: var(--ink);
    font-size: 1.25rem;
    font-weight: 900;
    text-align: center;
  }

  .stretch-choice-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .stretch-choice-card {
    display: grid;
    place-items: center;
    gap: 6px;
    min-height: 138px;
    padding: 14px 10px;
    border: 3px solid var(--line-soft);
    border-radius: 10px;
    background: linear-gradient(180deg, #fffaf0, #eed7a6);
    color: var(--primary-dark);
    text-transform: uppercase;
    box-shadow: 0 10px 18px rgba(50, 34, 10, 0.12);
  }

  .stretch-choice-card strong {
    font-size: 1.35rem;
  }

  .stretch-choice-card span:last-child {
    color: var(--muted);
    font-size: 0.86rem;
    font-weight: 900;
    text-transform: none;
  }

  .stretch-target-icon {
    display: grid;
    place-items: center;
    width: 50px;
    height: 50px;
    border: 4px solid currentColor;
    border-radius: 999px;
    font-size: 2rem;
    line-height: 1;
  }

  .stretch-choice-card.selected {
    border-color: var(--gold);
    background: linear-gradient(180deg, #0b6d32, #043c1e);
    color: #fff8de;
    box-shadow: 0 0 0 4px rgba(225, 184, 75, 0.28);
  }

  .stretch-choice-card.selected span:last-child {
    color: #f4e3b1;
  }

  .inline-blocker {
    margin: 0;
    color: var(--warn);
    font-weight: 900;
  }

  .inline-success {
    margin: 0;
    color: var(--green);
    font-weight: 900;
  }

  .result-prompt {
    margin: 0;
    text-align: center;
    color: #fff8de;
    font-size: 1.45rem;
    font-weight: 900;
  }

  .result-button-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 22px;
  }

  .result-button {
    display: grid;
    place-items: center;
    gap: 10px;
    min-height: 170px;
    border: 3px solid var(--gold);
    border-radius: 10px;
    background: #fff;
    font-size: 1.45rem;
    font-weight: 900;
    text-transform: uppercase;
    box-shadow: 0 12px 22px rgba(0, 0, 0, 0.22);
  }

  .result-button .result-icon {
    font-size: 4rem;
    line-height: 1;
  }

  .result-button.made {
    background: linear-gradient(180deg, #15843b, #06451f);
    color: #fff8de;
  }

  .result-button.missed {
    background: linear-gradient(180deg, #b82d22, #65100c);
    color: #fff8de;
  }

  .result-button.short {
    color: var(--orange);
  }

  .result-button.side {
    color: var(--primary);
  }

  .result-button.selected {
    border-color: #fff2bd;
    box-shadow: inset 0 0 0 5px rgba(255, 242, 189, 0.36), 0 0 0 4px rgba(225, 184, 75, 0.3);
  }

  .result-button.made.selected {
    background: linear-gradient(180deg, #21a84b, #075426);
  }

  .result-button.missed.selected {
    background: linear-gradient(180deg, #dc3a2e, #831710);
  }

  .ten-shot-section {
    display: grid;
    gap: 14px;
    padding: 16px;
    border: 2px solid var(--line-soft);
    border-radius: 10px;
    background: var(--panel);
  }

  .ten-shot-title {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    color: var(--primary-dark);
    font-weight: 900;
  }

  .ten-shot-title span {
    height: 1px;
    background: var(--line-soft);
  }
