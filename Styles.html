<style>
  :root {
    --ink: #06123f;
    --muted: #5f6b7a;
    --paper: #f7fbff;
    --panel: #ffffff;
    --line: #c9d4e6;
    --primary: #1455d9;
    --primary-dark: #07358f;
    --accent: #1455d9;
    --navy: #062a5f;
    --navy-dark: #031b3f;
    --blue-soft: #eaf2ff;
    --green: #188a35;
    --green-soft: #eaf8ee;
    --orange: #f47b20;
    --orange-soft: #fff3e8;
    --red: #e22d2d;
    --red-soft: #fff0f0;
    --gray: #d7dde8;
    --warn: #8a4b00;
    --danger: #b3261e;
    --success-bg: #e8f6ef;
    --backup-bg: #fff3d6;
    --shadow: 0 14px 34px rgba(7, 24, 63, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #ffffff;
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px;
    line-height: 1.4;
  }

  button, input, select, textarea {
    font: inherit;
  }

  .kiosk-layout {
    display: grid;
    grid-template-columns: 210px minmax(0, 1fr);
    min-height: 100vh;
  }

  .app-sidebar {
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    height: 100vh;
    padding: 22px 14px;
    background: linear-gradient(180deg, var(--navy), var(--navy-dark));
    color: #fff;
  }

  .sidebar-logo {
    display: grid;
    justify-items: center;
    gap: 10px;
    text-align: center;
  }

  .sidebar-mark {
    display: grid;
    place-items: center;
    width: 72px;
    height: 72px;
    border: 3px solid #ffad36;
    border-radius: 18px;
    color: #ffad36;
    font-weight: 900;
    letter-spacing: 1px;
  }

  .sidebar-logo h1 {
    color: #fff;
    font-size: 1.45rem;
    line-height: 1.05;
  }

  .sidebar-nav {
    display: grid;
    gap: 8px;
  }

  .sidebar-step {
    display: grid;
    grid-template-columns: 36px 1fr;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    padding: 6px 8px;
    border-radius: 10px;
    color: #eef5ff;
    font-weight: 800;
  }

  .sidebar-step.active {
    background: #fff;
    color: var(--primary);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
  }

  .sidebar-number {
    display: grid;
    place-items: center;
    width: 32px;
    height: 32px;
    border: 2px solid currentColor;
    border-radius: 999px;
  }

  .sidebar-reminder {
    display: grid;
    gap: 8px;
    margin-top: auto;
    padding: 16px;
    border-radius: 10px;
    background: #eef5ff;
    color: var(--ink);
    font-size: 0.9rem;
    box-shadow: var(--shadow);
  }

  .sidebar-reminder strong {
    color: var(--primary-dark);
  }

  .app-shell {
    min-width: 0;
    min-height: 100vh;
    padding: 24px 28px;
    background: var(--paper);
  }

  .proof-mode .kiosk-layout {
    grid-template-columns: 1fr;
  }

  .proof-mode .app-sidebar {
    display: none;
  }

  .top-bar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  h1, h2, h3 {
    margin: 0;
    line-height: 1.15;
  }

  h1 {
    font-size: 2rem;
  }

  h2 {
    font-size: 1.75rem;
    margin-bottom: 8px;
  }

  h3 {
    font-size: 1.2rem;
    margin-bottom: 10px;
  }

  .notice {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    margin-bottom: 14px;
    border: 2px solid #e6a23c;
    background: #fff8e8;
    border-radius: 8px;
  }

  .hidden {
    display: none !important;
  }

  .progress-wrap {
    margin-bottom: 18px;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 8px;
    color: var(--muted);
    font-weight: 700;
  }

  .progress-track {
    height: 12px;
    background: #dfe6ee;
    border-radius: 999px;
    overflow: hidden;
  }

  #progressFill {
    width: 0%;
    height: 100%;
    background: var(--accent);
    transition: width 0.2s ease;
  }

  #screenHost {
    min-height: 58vh;
  }

  .screen {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 20px;
  }

  .screen-intro {
    max-width: 820px;
    margin: 0 0 18px;
    color: var(--muted);
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }

  label.field {
    display: grid;
    gap: 8px;
    font-weight: 700;
  }

  input[type="text"], input[type="email"], select, textarea {
    width: 100%;
    min-height: 54px;
    padding: 12px;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
  }

  textarea {
    min-height: 96px;
    resize: vertical;
  }

  .check-list, .choice-list {
    display: grid;
    gap: 12px;
  }

  .check-row, .choice-row {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 58px;
    padding: 12px;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }

  .check-row input, .choice-row input {
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }

  .card,
  .station-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    background: #fff;
  }

  .station-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }

  .station-card {
    display: grid;
    align-content: start;
    gap: 12px;
  }

  .result-buttons {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .tap-choice {
    min-height: 52px;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    font-weight: 700;
  }

  .tap-choice.selected {
    border-color: var(--primary);
    background: #e5f3ef;
    color: var(--primary-dark);
  }

  .ten-shot-cards {
    grid-template-columns: 1fr;
  }

  .trial-card {
    display: grid;
    gap: 8px;
  }

  .trial-count {
    display: inline-block;
    margin-left: 8px;
    padding: 3px 8px;
    border-radius: 999px;
    background: #eef5ff;
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 800;
  }

  .trial-row {
    display: grid;
    grid-template-columns: 86px 1fr;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f9fbfd;
  }

  .trial-label {
    color: var(--muted);
    font-weight: 800;
  }

  .trial-row .result-buttons {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    margin-bottom: 0;
  }

  .trial-row .tap-choice {
    min-height: 44px;
    padding: 8px 6px;
    font-size: 0.92rem;
  }

  .meaning-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .mini-note {
    padding: 10px;
    border-left: 5px solid var(--accent);
    background: #eef5ff;
    border-radius: 6px;
    margin: 12px 0;
  }

  .member-builder {
    display: grid;
    gap: 12px;
    margin-top: 16px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }

  .member-builder p {
    margin: 0;
    color: var(--muted);
    font-weight: 700;
  }

  .member-add-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(130px, auto);
    gap: 10px;
  }

  .member-count {
    color: var(--muted);
    font-weight: 800;
  }

  .member-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .member-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 8px 8px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--blue-soft);
    color: var(--ink);
    font-weight: 900;
  }

  .member-empty {
    color: var(--muted);
    font-weight: 800;
  }

  .kiosk-screen {
    display: grid;
    gap: 20px;
    min-height: 68vh;
    color: var(--ink);
  }

  .kiosk-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(260px, auto);
    align-items: start;
    gap: 18px;
  }

  .kiosk-title {
    margin: 0;
    color: var(--ink);
    font-size: 2rem;
    letter-spacing: 0;
  }

  .kiosk-subtitle {
    margin: 6px 0 0;
    color: var(--primary);
    font-size: 1.25rem;
    font-weight: 900;
  }

  .kiosk-step-badge {
    align-self: start;
    padding: 12px 28px;
    border-radius: 0 0 10px 10px;
    background: linear-gradient(180deg, #176bff, var(--primary));
    color: #fff;
    font-size: 1.1rem;
    font-weight: 900;
    box-shadow: 0 10px 22px rgba(20, 85, 217, 0.25);
  }

  .kiosk-trial-status {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    color: var(--ink);
    font-weight: 900;
  }

  .info-button {
    min-height: 44px;
    padding: 8px 16px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--primary);
    border-radius: 10px;
  }

  .kiosk-context {
    margin-top: -4px;
    color: var(--muted);
    font-weight: 800;
    text-align: center;
  }

  .kiosk-block-buttons {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .kiosk-block-button {
    display: grid;
    gap: 6px;
    min-height: 76px;
    padding: 12px;
    border: 2px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    text-align: left;
    box-shadow: 0 8px 18px rgba(7, 24, 63, 0.06);
  }

  .kiosk-block-button strong {
    font-size: 1.05rem;
  }

  .kiosk-block-button span {
    color: var(--muted);
    font-weight: 900;
  }

  .kiosk-block-button.active {
    border-color: var(--primary);
    background: var(--blue-soft);
    box-shadow: 0 0 0 4px rgba(20, 85, 217, 0.12);
  }

  .kiosk-block-button.complete {
    border-color: var(--green);
    background: var(--green-soft);
  }

  .kiosk-block-button.needs-stretch {
    border-color: var(--orange);
    background: var(--orange-soft);
  }

  .kiosk-block-button.locked {
    border-color: #c9d3df;
    background: #eef2f6;
    color: #627084;
    box-shadow: none;
  }

  .kiosk-stretch-row {
    max-width: 420px;
    justify-self: center;
    width: 100%;
  }

  .result-prompt {
    margin: 0;
    text-align: center;
    color: var(--ink);
    font-size: 1.25rem;
    font-weight: 900;
  }

  .result-button-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 22px;
  }

  .result-button {
    display: grid;
    place-items: center;
    gap: 8px;
    min-height: 128px;
    border: 2px solid currentColor;
    border-radius: 14px;
    background: #fff;
    font-size: 1rem;
    font-weight: 900;
  }

  .result-button .result-icon {
    font-size: 3rem;
    line-height: 1;
  }

  .result-button.made {
    color: var(--green);
  }

  .result-button.missed {
    color: var(--red);
  }

  .result-button.short {
    color: var(--orange);
  }

  .result-button.side {
    color: var(--primary);
  }

  .result-button.selected {
    background: var(--blue-soft);
    box-shadow: inset 0 0 0 4px rgba(20, 85, 217, 0.12);
  }

  .result-button.made.selected {
    background: var(--green-soft);
  }

  .result-button.missed.selected {
    background: var(--red-soft);
  }

  .ten-shot-section {
    display: grid;
    gap: 14px;
  }

  .ten-shot-title {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    color: var(--primary);
    font-weight: 900;
  }

  .ten-shot-title span {
    height: 1px;
    background: var(--line);
  }

  .ten-shot-tiles {
    display: grid;
    grid-template-columns: repeat(10, minmax(56px, 1fr));
    gap: 8px;
  }

  .ten-shot-tile {
    display: grid;
    place-items: center;
    gap: 3px;
    min-height: 106px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    color: var(--ink);
    font-weight: 900;
  }

  .ten-shot-tile strong {
    font-size: 1.5rem;
  }

  .ten-shot-tile em {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border-radius: 999px;
    background: #9aa6b8;
    color: #fff;
    font-style: normal;
  }

  .ten-shot-tile.active {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(20, 85, 217, 0.12);
  }

  .ten-shot-tile.complete.made em,
  .legend-item.made em {
    background: var(--green);
  }

  .ten-shot-tile.complete.short em,
  .legend-item.short em {
    background: var(--orange);
  }

  .ten-shot-tile.complete.missed em,
  .legend-item.missed em {
    background: var(--red);
  }

  .ten-shot-tile.complete.side em,
  .legend-item.side em {
    background: var(--primary);
  }

  .result-legend {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-size: 0.95rem;
    font-weight: 800;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .legend-item em {
    display: grid;
    place-items: center;
    width: 26px;
    height: 26px;
    border-radius: 999px;
    background: #9aa6b8;
    color: #fff;
    font-style: normal;
  }

  .kiosk-controls {
    display: grid;
    grid-template-columns: minmax(110px, 160px) minmax(140px, 190px);
    justify-content: space-between;
    align-items: end;
    gap: 18px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  .kiosk-select-label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 900;
  }

  .kiosk-select {
    min-height: 54px;
    border-color: var(--line);
  }

  .kiosk-bottom-note {
    color: var(--muted);
    text-align: center;
    font-size: 0.95rem;
    font-weight: 800;
  }

  .diagram {
    min-height: 210px;
    display: grid;
    place-items: center;
    border: 1px dashed #aeb8c4;
    border-radius: 8px;
    margin-bottom: 12px;
    background: #f7fafc;
    text-align: center;
  }

  .ball {
    display: inline-grid;
    place-items: center;
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: #f6cf58;
    border: 3px solid #7d640d;
    font-weight: 700;
  }

  .arrow-label {
    font-weight: 700;
    color: var(--muted);
  }

  .table-line {
    width: 180px;
    height: 6px;
    background: #6b7280;
    margin: 8px auto 0;
    border-radius: 999px;
  }

  code {
    padding: 4px 6px;
    border-radius: 6px;
    background: #eef3f7;
    overflow-wrap: anywhere;
  }

  .review-list, .proof-grid {
    display: grid;
    gap: 10px;
  }

  .review-item, .proof-grid div {
    display: grid;
    grid-template-columns: minmax(150px, 260px) 1fr;
    gap: 10px;
    padding: 10px;
    background: #f4f7fa;
    border-radius: 8px;
  }

  .score-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 160px;
    min-height: 72px;
    margin: 12px 0;
    padding: 12px 18px;
    border-radius: 8px;
    background: #e5f3ef;
    color: var(--primary-dark);
    font-size: 1.6rem;
    font-weight: 800;
  }

  .warning-text {
    color: var(--warn);
    font-weight: 700;
  }

  .error-text {
    color: var(--danger);
    font-weight: 700;
  }

  .nav-bar {
    position: sticky;
    bottom: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    gap: 10px;
    margin-top: 18px;
    padding: 12px 0 0;
    background: var(--paper);
  }

  button {
    min-height: 56px;
    border: 0;
    border-radius: 8px;
    padding: 10px 14px;
    font-weight: 800;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .primary {
    background: var(--primary);
    color: #fff;
  }

  .secondary {
    background: #e7edf3;
    color: var(--ink);
  }

  .danger {
    background: #fde7e5;
    color: var(--danger);
  }

  .small {
    min-height: 44px;
    font-size: 0.95rem;
  }

  .proof {
    min-height: 60vh;
    border-radius: 8px;
    padding: 20px;
    border: 3px solid transparent;
  }

  .proof.submitted {
    background: var(--success-bg);
    border-color: var(--primary);
  }

  .proof.backup {
    background: var(--backup-bg);
    border-color: #d48700;
  }

  .big-status {
    margin: 8px 0 16px;
    font-size: 1.35rem;
    font-weight: 900;
  }

  pre {
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    background: #fff;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
  }

  @media (max-width: 900px) {
    .kiosk-layout {
      grid-template-columns: 1fr;
    }

    .app-sidebar {
      position: static;
      height: auto;
      padding: 14px;
    }

    .sidebar-logo {
      grid-template-columns: auto 1fr;
      justify-items: start;
      text-align: left;
    }

    .sidebar-mark {
      width: 54px;
      height: 54px;
      border-radius: 14px;
    }

    .sidebar-nav {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .sidebar-step {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
      font-size: 0.78rem;
    }

    .sidebar-reminder {
      display: none;
    }

    .kiosk-header {
      grid-template-columns: 1fr;
    }

    .kiosk-step-badge {
      justify-self: start;
      border-radius: 10px;
    }

    .kiosk-trial-status {
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .result-button-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .kiosk-block-buttons {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .ten-shot-tiles {
      grid-template-columns: repeat(5, minmax(70px, 1fr));
    }

    .kiosk-controls {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 640px) {
    body {
      font-size: 17px;
    }

    .app-shell {
      padding: 14px;
    }

    .top-bar {
      display: grid;
    }

    h1 {
      font-size: 1.65rem;
    }

    .screen {
      padding: 14px;
    }

    .station-grid,
    .kiosk-block-buttons {
      grid-template-columns: 1fr;
    }

    .review-item, .proof-grid div {
      grid-template-columns: 1fr;
    }

    .trial-row {
      grid-template-columns: 1fr;
    }

    .trial-row .result-buttons {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .nav-bar {
      position: sticky;
      bottom: 0;
      z-index: 10;
      grid-template-columns: 1fr;
      padding: 12px 0 max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      box-shadow: 0 -10px 24px rgba(7, 24, 63, 0.08);
    }
  }
</style>
