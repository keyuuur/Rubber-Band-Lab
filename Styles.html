<style>
  :root {
    --ink: #1c232b;
    --muted: #596675;
    --paper: #fbfcfd;
    --panel: #ffffff;
    --line: #d6dde6;
    --primary: #176b5d;
    --primary-dark: #0f5147;
    --accent: #2d6cdf;
    --warn: #8a4b00;
    --danger: #b3261e;
    --success-bg: #e8f6ef;
    --backup-bg: #fff3d6;
    --shadow: 0 8px 22px rgba(24, 35, 48, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #eef3f7;
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px;
    line-height: 1.4;
  }

  button, input, select, textarea {
    font: inherit;
  }

  .app-shell {
    width: min(980px, 100%);
    min-height: 100vh;
    margin: 0 auto;
    padding: 20px;
    background: var(--paper);
  }

  .top-bar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  h1, h2, h3 {
    margin: 0;
    line-height: 1.15;
  }

  h1 {
    font-size: 2rem;
  }

  h2 {
    font-size: 1.75rem;
    margin-bottom: 8px;
  }

  h3 {
    font-size: 1.2rem;
    margin-bottom: 10px;
  }

  .notice {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    margin-bottom: 14px;
    border: 2px solid #e6a23c;
    background: #fff8e8;
    border-radius: 8px;
  }

  .hidden {
    display: none !important;
  }

  .progress-wrap {
    margin-bottom: 18px;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 8px;
    color: var(--muted);
    font-weight: 700;
  }

  .progress-track {
    height: 12px;
    background: #dfe6ee;
    border-radius: 999px;
    overflow: hidden;
  }

  #progressFill {
    width: 0%;
    height: 100%;
    background: var(--primary);
    transition: width 0.2s ease;
  }

  #screenHost {
    min-height: 58vh;
  }

  .screen {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 20px;
  }

  .screen-intro {
    max-width: 820px;
    margin: 0 0 18px;
    color: var(--muted);
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }

  label.field {
    display: grid;
    gap: 8px;
    font-weight: 700;
  }

  input[type="text"], input[type="email"], select, textarea {
    width: 100%;
    min-height: 54px;
    padding: 12px;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
  }

  textarea {
    min-height: 96px;
    resize: vertical;
  }

  .check-list, .choice-list {
    display: grid;
    gap: 12px;
  }

  .check-row, .choice-row {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 58px;
    padding: 12px;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }

  .check-row input, .choice-row input {
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }

  .card {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    background: #fff;
  }

  .result-buttons {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .tap-choice {
    min-height: 52px;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    font-weight: 700;
  }

  .tap-choice.selected {
    border-color: var(--primary);
    background: #e5f3ef;
    color: var(--primary-dark);
  }

  .meaning-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .mini-note {
    padding: 10px;
    border-left: 5px solid var(--accent);
    background: #eef5ff;
    border-radius: 6px;
    margin: 12px 0;
  }

  .diagram {
    min-height: 210px;
    display: grid;
    place-items: center;
    border: 1px dashed #aeb8c4;
    border-radius: 8px;
    margin-bottom: 12px;
    background: #f7fafc;
    text-align: center;
  }

  .ball {
    display: inline-grid;
    place-items: center;
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: #f6cf58;
    border: 3px solid #7d640d;
    font-weight: 700;
  }

  .arrow-label {
    font-weight: 700;
    color: var(--muted);
  }

  .table-line {
    width: 180px;
    height: 6px;
    background: #6b7280;
    margin: 8px auto 0;
    border-radius: 999px;
  }

  .email-box {
    display: grid;
    gap: 10px;
    padding: 14px;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: #fff;
    margin-bottom: 14px;
  }

  .copy-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  code {
    padding: 4px 6px;
    border-radius: 6px;
    background: #eef3f7;
    overflow-wrap: anywhere;
  }

  .review-list, .proof-grid {
    display: grid;
    gap: 10px;
  }

  .review-item, .proof-grid div {
    display: grid;
    grid-template-columns: minmax(150px, 260px) 1fr;
    gap: 10px;
    padding: 10px;
    background: #f4f7fa;
    border-radius: 8px;
  }

  .score-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 160px;
    min-height: 72px;
    margin: 12px 0;
    padding: 12px 18px;
    border-radius: 8px;
    background: #e5f3ef;
    color: var(--primary-dark);
    font-size: 1.6rem;
    font-weight: 800;
  }

  .warning-text {
    color: var(--warn);
    font-weight: 700;
  }

  .error-text {
    color: var(--danger);
    font-weight: 700;
  }

  .nav-bar {
    position: sticky;
    bottom: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    gap: 10px;
    margin-top: 18px;
    padding: 12px 0 0;
    background: var(--paper);
  }

  button {
    min-height: 56px;
    border: 0;
    border-radius: 8px;
    padding: 10px 14px;
    font-weight: 800;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .primary {
    background: var(--primary);
    color: #fff;
  }

  .secondary {
    background: #e7edf3;
    color: var(--ink);
  }

  .danger {
    background: #fde7e5;
    color: var(--danger);
  }

  .small {
    min-height: 44px;
    font-size: 0.95rem;
  }

  .proof {
    min-height: 60vh;
    border-radius: 8px;
    padding: 20px;
    border: 3px solid transparent;
  }

  .proof.submitted {
    background: var(--success-bg);
    border-color: var(--primary);
  }

  .proof.backup {
    background: var(--backup-bg);
    border-color: #d48700;
  }

  .big-status {
    margin: 8px 0 16px;
    font-size: 1.35rem;
    font-weight: 900;
  }

  pre {
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    background: #fff;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
  }

  @media (max-width: 640px) {
    body {
      font-size: 17px;
    }

    .app-shell {
      padding: 14px;
    }

    .top-bar {
      display: grid;
    }

    h1 {
      font-size: 1.65rem;
    }

    .screen {
      padding: 14px;
    }

    .review-item, .proof-grid div {
      grid-template-columns: 1fr;
    }

    .nav-bar {
      grid-template-columns: 1fr;
    }
  }
</style>
